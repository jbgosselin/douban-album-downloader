<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="podGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7CB342"/>
      <stop offset="50%" stop-color="#558B2F"/>
      <stop offset="100%" stop-color="#33691E"/>
    </linearGradient>
    <linearGradient id="beanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFF9C4"/>
      <stop offset="40%" stop-color="#F9E076"/>
      <stop offset="100%" stop-color="#E6C94A"/>
    </linearGradient>
    <radialGradient id="beanHighlight" cx="35%" cy="35%" r="50%">
      <stop offset="0%" stop-color="#FFFDE7" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#F9E076" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1B5E20"/>
      <stop offset="100%" stop-color="#2E7D32"/>
    </linearGradient>
    <filter id="frameShadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <filter id="arrowShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1" stdDeviation="3" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect x="0" y="0" width="512" height="512" rx="100" ry="100" fill="url(#bgGrad)"/>

  <!-- Subtle pattern overlay -->
  <g opacity="0.05">
    <circle cx="80" cy="80" r="40" fill="#fff"/>
    <circle cx="430" cy="100" r="35" fill="#fff"/>
    <circle cx="90" cy="420" r="30" fill="#fff"/>
    <circle cx="420" cy="400" r="45" fill="#fff"/>
  </g>

  <!-- Photo/album stack behind the bean -->
  <g filter="url(#frameShadow)" transform="translate(256, 245) rotate(-10) translate(-256, -245)">
    <rect x="70" y="60" width="290" height="340" rx="8" fill="#fff" opacity="0.45"/>
    <rect x="85" y="75" width="260" height="240" rx="3" fill="#4CAF50" opacity="0.25"/>
  </g>
  <g filter="url(#frameShadow)" transform="translate(256, 245) rotate(5) translate(-256, -245)">
    <rect x="85" y="50" width="290" height="340" rx="8" fill="#fff" opacity="0.6"/>
    <rect x="100" y="65" width="260" height="240" rx="3" fill="#66BB6A" opacity="0.25"/>
  </g>

  <!-- Soybean pod - LARGE, centered -->
  <g transform="translate(250, 235)">
    <!-- Pod body -->
    <ellipse cx="0" cy="0" rx="175" ry="80" fill="url(#podGrad)" transform="rotate(-15)"
             stroke="#2E7D32" stroke-width="2.5"/>
    <!-- Pod seam line -->
    <path d="M-162,12 Q-80,-22 0,-26 Q80,-22 162,12" fill="none" stroke="#33691E"
          stroke-width="3" stroke-linecap="round" transform="rotate(-15)" opacity="0.55"/>

    <!-- Bean 1 (left) -->
    <g transform="translate(-78, -2) rotate(-15)">
      <ellipse cx="0" cy="0" rx="47" ry="38" fill="url(#beanGrad)"/>
      <ellipse cx="0" cy="0" rx="47" ry="38" fill="url(#beanHighlight)"/>
      <path d="M-2,-33 Q4,0 -2,33" fill="none" stroke="#C9A83E" stroke-width="2.2" stroke-linecap="round"/>
    </g>

    <!-- Bean 2 (center) -->
    <g transform="translate(12, -16) rotate(-15)">
      <ellipse cx="0" cy="0" rx="50" ry="42" fill="url(#beanGrad)"/>
      <ellipse cx="0" cy="0" rx="50" ry="42" fill="url(#beanHighlight)"/>
      <path d="M-2,-36 Q4,0 -2,36" fill="none" stroke="#C9A83E" stroke-width="2.2" stroke-linecap="round"/>
    </g>

    <!-- Bean 3 (right) -->
    <g transform="translate(97, -26) rotate(-15)">
      <ellipse cx="0" cy="0" rx="44" ry="36" fill="url(#beanGrad)"/>
      <ellipse cx="0" cy="0" rx="44" ry="36" fill="url(#beanHighlight)"/>
      <path d="M-2,-30 Q4,0 -2,30" fill="none" stroke="#C9A83E" stroke-width="2.2" stroke-linecap="round"/>
    </g>

    <!-- Pod highlight -->
    <ellipse cx="0" cy="0" rx="173" ry="78" fill="none" stroke="#8BC34A"
             stroke-width="2" transform="rotate(-15)" opacity="0.35"
             stroke-dasharray="50 280" stroke-dashoffset="-30"/>
  </g>

  <!-- Stem -->
  <path d="M375,140 Q400,105 385,70 Q375,50 390,30" fill="none" stroke="#558B2F"
        stroke-width="6" stroke-linecap="round"/>
  <!-- Leaf -->
  <path d="M387,55 Q415,30 400,8 Q380,35 387,55Z" fill="#7CB342" opacity="0.85"/>

  <!-- Download arrow badge - bottom right corner -->
  <g transform="translate(400, 410)" filter="url(#arrowShadow)">
    <circle cx="0" cy="0" r="52" fill="#FFFFFF" opacity="0.95"/>
    <circle cx="0" cy="0" r="48" fill="#1B5E20" opacity="0.9"/>
    <!-- Arrow shaft -->
    <rect x="-7" y="-26" width="14" height="28" rx="3" fill="#fff"/>
    <!-- Arrow head -->
    <polygon points="-18,-2 0,18 18,-2" fill="#fff"/>
    <!-- Base line -->
    <rect x="-20" y="22" width="40" height="4" rx="2" fill="#fff" opacity="0.85"/>
  </g>
</svg>
